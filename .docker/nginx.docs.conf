server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Cache static assets (VitePress hashes filenames, so aggressive caching is safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML files should not be cached (always fetch latest after rebuild)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # SPA-like fallback: serve index.html for any non-file path so VitePress client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }
}