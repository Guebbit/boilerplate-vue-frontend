name: CI

on:
    # Run on every PR and on direct pushes to main.
    # This gives fast feedback for feature branches and protects main.
    pull_request:
    push:
        branches:
            - main

concurrency:
    # Cancel stale runs for the same branch/PR when newer commits arrive.
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        # Single "quality gate" job for this boilerplate.
        runs-on: ubuntu-latest
        timeout-minutes: 30
        # Principle of least privilege:
        # workflow only needs to read repository contents.
        permissions:
            contents: read
        steps:
            # 1) Get the repository code.
            - name: Checkout
              uses: actions/checkout@v4

            # 2) Configure Node and npm cache for faster installs.
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: package-lock.json

            # 3) Cache the Cypress binary too, so e2e does not re-download it every run.
            - name: Cache Cypress binary
              uses: actions/cache@v4
              with:
                  path: ~/.cache/Cypress
                  key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      cypress-${{ runner.os }}-

            # 4) Install exact lockfile dependencies (reproducible builds).
            - name: Install dependencies
              run: npm ci

            # 5) Run the strict repository validation gate; npm scripts already include unit + e2e.
            - name: Complete validation check
              run: npm run complete:check
