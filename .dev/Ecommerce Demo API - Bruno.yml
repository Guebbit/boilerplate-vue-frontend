opencollection: 1.0.0
info:
  name: Ecommerce Demo API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: Local
      variables:
        - name: baseUrl
          value: http://localhost:3001
    - name: Production
      variables:
        - name: baseUrl
          value: https://api.example.com
items:
