      name: Account
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: Current user info
          type: http
          seq: 1
          tags:
            - Account
        http:
          method: GET
          url: '{{baseUrl}}/account'
          auth:
            type: bearer
            token: '{{token}}'
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        examples:
          - name: 200 Response
            description: Current user info
            request:
              url: '{{baseUrl}}/account'
              method: GET
            response:
              status: 200
              statusText: OK
              headers:
                - name: Content-Type
                  value: application/json
              body:
                type: json
                data: |-
                  {
                    "id": "",
                    "email": "",
                    "username": "",
                    "admin": false,
                    "active": false,
                    "imageUrl": "",
                    "createdAt": "",
                    "updatedAt": ""
                  }
          - name: 401 Response
            description: Unauthorized
            request:
              url: '{{baseUrl}}/account'
              method: GET
            response:
              status: 401
              statusText: Unauthorized
              headers:
                - name: Content-Type
                  value: application/json
              body:
                type: json
                data: |-
                  {
                    "success": false,
                    "error": {
                      "code": "AUTH_INVALID_TOKEN",
                      "message": "",
                      "details": {}
                    },
                    "traceId": ""
                  }
