openapi: 3.0.3
info:
    title: Node Demo API
    version: "2.0.0"
    description: |
        Stable, codegen-oriented OpenAPI contract.
        Designed for multi-project, multi-language use (client/server stubs, DTOs, SDKs).
    contact:
        name: API Team

servers:
    -   url: http://localhost:3000
        description: Local
    -   url: https://api.example.com
        description: Production

tags:
    -   name: System
    -   name: Auth
    -   name: Account
    -   name: Users
    -   name: Products
    -   name: Cart
    -   name: Orders

# If set, by default all operation requires an authentication
# security:
#    - bearerAuth: []

components:
    # This is a common security scheme that can be used by any operation
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

    parameters:
        # Common parameters
        PageParam:
            name: page
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Page'
            description: 1-based page index
        PageSizeParam:
            name: pageSize
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/PageSize'
        TextParam:
            name: text
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Text'

        # Query ID parameters (just for filtering)
        UserIdParam:
            name: userId
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Id'
        ProductIdParam:
            name: productId
            in: query
            required: false
            schema:
                $ref: '#/components/schemas/Id'

        # Path ID parameters (for resource lookup)
        IdPathParam:
            name: id
            in: path
            required: true
            schema:
                $ref: '#/components/schemas/Id'
            description: Resource identifier
        ProductIdPathParam:
            name: productId
            in: path
            required: true
            schema:
                $ref: '#/components/schemas/Id'
            description: Product identifier

        # Product-related filter parameters
        ProductsMinPrice:
            name: minPrice
            in: query
            required: false
            schema:
                type: number
                format: double
                minimum: 0
        ProductsMaxPrice:
            name: maxPrice
            in: query
            required: false
            schema:
                type: number
                format: double
                minimum: 0

        # Specific parameters
        HardDeleteQuery:
            name: hardDelete
            in: query
            required: false
            schema:
                type: boolean
                default: false

    responses:
        Unauthorized:
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        Forbidden:
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        ValidationError:
            description: Validation failed
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ValidationErrorResponse'
        InternalError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'

    schemas:
        # ---------- Commons ----------
        Page:
            type: integer
            minimum: 1
            default: 1
            description: 1-based page index
        PageSize:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
            description: Optional override; server may clamp to a max
        Id:
            type: string
            description: Resource identifier
        Text:
            type: string
            minLength: 1
            description: Free-text search string
        Email:
            type: string
            format: email
        Password:
            type: string
            minLength: 8

        # ---------- Meta / envelope ----------
        PaginationMeta:
            type: object
            required: [ page, pageSize, totalItems, totalPages ]
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    $ref: '#/components/schemas/PageSize'
                totalItems:
                    type: integer
                    minimum: 0
                totalPages:
                    type: integer
                    minimum: 0

        MessageResponse:
            type: object
            required: [ message ]
            properties:
                message:
                    type: string

        EmptyObject:
            type: object
            additionalProperties: false

        # ---------- Error model ----------
        ErrorResponse:
            type: object
            required: [ error ]
            properties:
                error:
                    $ref: '#/components/schemas/ErrorDetail'
                traceId:
                    type: string
                    description: Correlation ID for support/debugging

        ErrorDetail:
            type: object
            required: [ code, message ]
            properties:
                code:
                    type: string
                    example: AUTH_INVALID_TOKEN
                message:
                    type: string
                details:
                    type: object
                    additionalProperties: true

        ValidationErrorResponse:
            allOf:
                -   $ref: '#/components/schemas/ErrorResponse'
                -   type: object
                    required: [ errors ]
                    properties:
                        errors:
                            type: array
                            items:
                                $ref: '#/components/schemas/FieldError'

        FieldError:
            type: object
            required: [ field, message ]
            properties:
                field:
                    type: string
                message:
                    type: string
                code:
                    type: string

        # ---------- Domain ----------
        AuthTokens:
            type: object
            required: [ token ]
            properties:
                token:
                    type: string
                    description: Access JWT
                refreshToken:
                    type: string
                    description: Refresh token if returned by backend
                expiresIn:
                    type: integer
                    description: Access token expiry in seconds

        User:
            type: object
            required: [ id, email, username, admin, active ]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                email:
                    $ref: '#/components/schemas/Email'
                username:
                    type: string
                admin:
                    type: boolean
                active:
                    type: boolean
                imageUrl:
                    type: string
                    format: uri
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        Product:
            type: object
            required: [ id, title, price, description, active ]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0
                description:
                    type: string
                active:
                    type: boolean
                imageUrl:
                    type: string
                    format: uri
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        CartItem:
            type: object
            required: [ productId, quantity ]
            properties:
                productId:
                    $ref: '#/components/schemas/Id'
                quantity:
                    type: integer
                    minimum: 1

        Order:
            type: object
            required: [ id, userId, email, items, total, status ]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                userId:
                    $ref: '#/components/schemas/Id'
                email:
                    $ref: '#/components/schemas/Email'
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartItem'
                total:
                    type: number
                    format: double
                    minimum: 0
                status:
                    type: string
                    enum: [ pending, paid, processing, shipped, delivered, cancelled ]
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        Invoice:
            type: object
            required: [ id, orderId, url ]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                orderId:
                    $ref: '#/components/schemas/Id'
                url:
                    type: string
                    format: uri

        # ---------- Request DTOs AUTHENTICATION ----------
        LoginRequest:
            type: object
            additionalProperties: false
            required: [ email, password ]
            properties:
                email:
                    $ref: '#/components/schemas/Email'
                password:
                    $ref: '#/components/schemas/Password'

        SignupRequest:
            type: object
            additionalProperties: false
            required: [ email, username, password, passwordConfirm ]
            properties:
                email:
                    $ref: '#/components/schemas/Email'
                username:
                    type: string
                    minLength: 3
                imageUrl:
                    type: string
                    format: uri
                password:
                    $ref: '#/components/schemas/Password'
                passwordConfirm:
                    $ref: '#/components/schemas/Password'

        ResetRequest:
            type: object
            additionalProperties: false
            required: [ email ]
            properties:
                email:
                    $ref: '#/components/schemas/Email'

        ResetConfirmRequest:
            type: object
            additionalProperties: false
            required: [ token, password, passwordConfirm ]
            properties:
                token:
                    type: string
                    description: One-time password reset token (NOT a JWT).
                password:
                    $ref: '#/components/schemas/Password'
                passwordConfirm:
                    $ref: '#/components/schemas/Password'

        # ---------- Request DTOs USERS ----------
        UsersListRequest:
            type: object
            additionalProperties: false
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    $ref: '#/components/schemas/PageSize'
                text:
                    $ref: '#/components/schemas/Text'

        AddUserRequestJson:
            type: object
            additionalProperties: false
            required: [ email, username, password, admin, active ]
            properties:
                email:
                    $ref: '#/components/schemas/Email'
                username:
                    type: string
                password:
                    $ref: '#/components/schemas/Password'
                admin:
                    type: boolean
                active:
                    type: boolean

        EditUserRequestJson:
            type: object
            additionalProperties: false
            required: [ id ]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                email:
                    $ref: '#/components/schemas/Email'
                password:
                    $ref: '#/components/schemas/Password'

        # ---------- Request DTOs PRODUCTS ----------
        ProductListRequest:
            type: object
            additionalProperties: false
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    $ref: '#/components/schemas/PageSize'
                text:
                    $ref: '#/components/schemas/Text'
                minPrice:
                    type: number
                    format: double
                    minimum: 0
                maxPrice:
                    type: number
                    format: double
                    minimum: 0

        OrdersListRequest:
            type: object
            additionalProperties: false
            properties:
                page:
                    $ref: '#/components/schemas/Page'
                pageSize:
                    $ref: '#/components/schemas/PageSize'
                userId:
                    $ref: '#/components/schemas/Id'
                productId:
                    $ref: '#/components/schemas/Id'
                email:
                    $ref: '#/components/schemas/Email'

        AddOrderRequestJson:
            type: object
            additionalProperties: false
            required: [ userId, email, items ]
            properties:
                userId:
                    $ref: '#/components/schemas/Id'
                email:
                    $ref: '#/components/schemas/Email'
                items:
                    type: array
                    minItems: 1
                    items:
                        $ref: '#/components/schemas/CartItem'
            description: Create a new order.

        # ---------- Request DTOs PRODUCTS ----------
        AddProductRequestJson:
            type: object
            additionalProperties: false
            required: [ title, price, description, active ]
            properties:
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0
                description:
                    type: string
                active:
                    type: boolean

        EditProductRequestJson:
            type: object
            additionalProperties: false
            required: [ id ]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0

        EditProductByIdRequestJson:
            type: object
            additionalProperties: false
            properties:
                title:
                    type: string
                price:
                    type: number
                    format: double
                    minimum: 0

        CartItemUpsertRequest:
            type: object
            additionalProperties: false
            required: [ productId, quantity ]
            properties:
                productId:
                    $ref: '#/components/schemas/Id'
                quantity:
                    type: integer
                    minimum: 1

        CheckoutRequest:
            type: object
            additionalProperties: false
            required: [email]
            properties:
                email:
                    $ref: '#/components/schemas/Email'
                notes:
                    type: string
                    nullable: true
                    description: Optional order notes

        # ---------- Response DTOs USERS ----------
        UserListResponse:
            type: object
            required: [ items, meta ]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/User'
                meta:
                    $ref: '#/components/schemas/PaginationMeta'

        # ---------- Response DTOs PRODUCTS ----------
        ProductListResponse:
            type: object
            required: [ items, meta ]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/Product'
                meta:
                    $ref: '#/components/schemas/PaginationMeta'

        OrderListResponse:
            type: object
            required: [ items, meta ]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/Order'
                meta:
                    $ref: '#/components/schemas/PaginationMeta'

        CartResponse:
            type: object
            required: [ items ]
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartItem'

        CartSummaryResponse:
            type: object
            required: [ itemsCount, totalQuantity, total ]
            properties:
                itemsCount:
                    type: integer
                    minimum: 0
                    description: Number of distinct cart lines/items
                totalQuantity:
                    type: integer
                    minimum: 0
                    description: Sum of quantities across all items
                total:
                    type: number
                    format: double
                    minimum: 0
                    description: Sum of item prices * quantity (before tax/shipping/discounts)
                currency:
                    type: string
                    description: ISO-4217 currency code (e.g. USD)

        CheckoutResponse:
            type: object
            required: [ order ]
            properties:
                order:
                    $ref: '#/components/schemas/Order'
                message:
                    type: string
                    nullable: true
paths:
    /:
        get:
            tags: [ System ]
            summary: Home
            operationId: getHome
            security: [ ]
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MessageResponse'
                '500': { $ref: '#/components/responses/InternalError' }

    # --------- Authentication ---------
    /account/login:
        post:
            tags: [ Auth ]
            summary: Login
            operationId: authLogin
            security: [ ]    # means: public
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
            responses:
                '200':
                    description: Auth tokens
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthTokens'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /account/signup:
        post:
            tags: [ Auth ]
            summary: Signup
            operationId: authSignup
            security: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SignupRequest'
            responses:
                '201':
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    # No need for {token} because that's in the GET page that gives only the form and put the token in the form hidden input.
    /account/reset:
        post:
            operationId: confirmPasswordReset
            security: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ResetConfirmRequest'
            responses:
                '200':
                    description: Password reset
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MessageResponse'

    # --------- Users ---------
    /users:
        get:
            tags: [ Users ]
            summary: List users (paginated)
            operationId: usersList
            security:
                -   bearerAuth: [ ]
            parameters:
                -   $ref: '#/components/parameters/PageParam'
                -   $ref: '#/components/parameters/PageSizeParam'
                -   $ref: '#/components/parameters/TextParam'
            responses:
                '200':
                    description: Users page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '500': { $ref: '#/components/responses/InternalError' }
        post:
            tags: [ Users ]
            summary: Search users (DTO-friendly)
            operationId: usersSearch
            security:
                -   bearerAuth: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UsersListRequest'
            responses:
                '200':
                    description: Users page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserListResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /users/{id}:
        get:
            tags: [ Users ]
            summary: User details
            operationId: usersDetails
            security:
                -   bearerAuth: [ ]
            parameters:
                -   $ref: '#/components/parameters/IdPathParam'
            responses:
                '200':
                    description: User
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '500': { $ref: '#/components/responses/InternalError' }
        put:
            tags: [ Users ]
            summary: Edit user
            operationId: usersEdit
            security:
                -   bearerAuth: [ ]
            parameters:
                -   $ref: '#/components/parameters/IdPathParam'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/EditUserRequestJson'
            responses:
                '200':
                    description: Updated user
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '404': { $ref: '#/components/responses/NotFound' }
                '500': { $ref: '#/components/responses/InternalError' }
        delete:
            tags: [ Users ]
            summary: Delete user
            operationId: usersDelete
            security:
                -   bearerAuth: [ ]
            parameters:
                -   $ref: '#/components/parameters/IdPathParam'
                -   $ref: '#/components/parameters/HardDeleteQuery'
            responses:
                '200':
                    description: Deleted
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MessageResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '500': { $ref: '#/components/responses/InternalError' }

    /users/new:
        post:
            tags: [ Users ]
            summary: Create user
            operationId: usersNew
            security:
                -   bearerAuth: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AddUserRequestJson'
            responses:
                '201':
                    description: Created user
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    # ----- Products -----
    /products:
        get:
            tags: [ Products ]
            summary: List products (paginated)
            operationId: productsList
            parameters:
                -   $ref: '#/components/parameters/PageParam'
                -   $ref: '#/components/parameters/ProductsMinPrice'
                -   $ref: '#/components/parameters/ProductsMaxPrice'
                -   $ref: '#/components/parameters/TextParam'
            responses:
                '200':
                    description: Products page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProductListResponse'
                '500': { $ref: '#/components/responses/InternalError' }
        post:
            tags: [ Products ]
            summary: Create product
            operationId: productsNew
            security:
                -   bearerAuth: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AddProductRequestJson'
            responses:
                '201':
                    description: Created product
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Product'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /products/{id}:
        get:
            tags: [ Products ]
            summary: Product details
            operationId: productsDetails
            parameters:
                -   $ref: '#/components/parameters/IdPathParam'
            responses:
                '200':
                    description: Product
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Product'
                '404': { $ref: '#/components/responses/NotFound' }
                '500': { $ref: '#/components/responses/InternalError' }
        put:
            tags: [ Products ]
            summary: Edit product
            operationId: productsEdit
            security:
                -   bearerAuth: [ ]
            parameters:
                -   $ref: '#/components/parameters/IdPathParam'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/EditProductByIdRequestJson'
            responses:
                '200':
                    description: Updated product
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Product'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '404': { $ref: '#/components/responses/NotFound' }
                '500': { $ref: '#/components/responses/InternalError' }
        delete:
            tags: [ Products ]
            summary: Delete product
            operationId: productsDelete
            security:
                -   bearerAuth: [ ]
            parameters:
                -   $ref: '#/components/parameters/IdPathParam'
                -   $ref: '#/components/parameters/HardDeleteQuery'
            responses:
                '200':
                    description: Deleted
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MessageResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '404': { $ref: '#/components/responses/NotFound' }
                '500': { $ref: '#/components/responses/InternalError' }

    # Same as GET /products, but with JSON body, more suitable for DTOs and multi-language codegen
    /products/search:
        post:
            tags: [ Products ]
            summary: Search products (DTO-friendly)
            operationId: productsSearch
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ProductListRequest'
            responses:
                '200':
                    description: Products page
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProductListResponse'
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }

    /cart:
        get:
            tags: [ Cart ]
            summary: Get cart
            operationId: cartGet
            security:
                -   bearerAuth: [ ]
            responses:
                '200':
                    description: Cart items
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CartResponse'
                '401': { $ref: '#/components/responses/Unauthorized' }
                '500': { $ref: '#/components/responses/InternalError' }
        post:
            tags: [ Cart ]
            summary: Add/update cart item (JSON)
            operationId: cartUpsertItem
            security:
                -   bearerAuth: [ ]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CartItemUpsertRequest'
            responses:
                '200':
                    description: Updated cart
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CartResponse'
                '422': { $ref: '#/components/responses/ValidationError' }
                '500': { $ref: '#/components/responses/InternalError' }
        delete:
            tags: [ Cart ]
            summary: Empty cart
            operationId: cartClear
            security:
